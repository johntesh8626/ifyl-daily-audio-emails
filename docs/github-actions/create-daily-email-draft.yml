name: Create daily email draft

on:
  workflow_dispatch:
    inputs:
      dropbox_path:
        description: "Optional exact Dropbox path to process"
        required: false
        type: string
      target_mode:
        description: "Kit target metadata"
        required: false
        default: "undecided"
        type: choice
        options:
          - undecided
          - broadcast
          - sequence
  schedule:
    - cron: "0 11 * * 1-5"

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest
      - name: Create draft
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_SHARED_LINK_URL: ${{ secrets.DROPBOX_SHARED_LINK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DROPBOX_PATH_INPUT: ${{ github.event.inputs.dropbox_path || '' }}
          KIT_TARGET_MODE: ${{ github.event.inputs.target_mode || 'undecided' }}
        run: |
          args=()
          if [ -n "$DROPBOX_PATH_INPUT" ]; then
            args+=(--dropbox-path "$DROPBOX_PATH_INPUT")
          fi
          python -m ifyl_daily_audio_emails.cli run-once "${args[@]}"
      - name: Commit generated draft
        run: |
          if [ -z "$(git status --porcelain -- generated/kit-drafts)" ]; then
            echo "No generated draft changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/kit-drafts
          git commit -m "Add daily IFYL email draft"
          git push
